<svg viewBox="0 0 640 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="340" fill="#080808" rx="4"/>

  <!-- Subtle grid -->
  <line x1="0" y1="170" x2="640" y2="170" stroke="#111" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="340" stroke="#111" stroke-width="1"/>

  <!-- Femur shaft -->
  <rect x="288" y="15" width="64" height="100" rx="18" fill="#151515" stroke="#b0b0b0" stroke-width="2" opacity="0.75"/>

  <!-- Femoral condyles -->
  <ellipse cx="296" cy="165" rx="52" ry="44" fill="#121212" stroke="#c8c8c8" stroke-width="2" opacity="0.8"/>
  <ellipse cx="368" cy="162" rx="48" ry="42" fill="#121212" stroke="#c0c0c0" stroke-width="2" opacity="0.8"/>

  <!-- Intercondylar notch -->
  <path d="M 316 196 Q 332 214 348 196" fill="none" stroke="#888" stroke-width="1.5" opacity="0.7"/>

  <!-- Patella (dashed) -->
  <ellipse cx="332" cy="135" rx="26" ry="18" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Tibial plateau -->
  <ellipse cx="332" cy="245" rx="82" ry="17" fill="#121212" stroke="#b0b0b0" stroke-width="2" opacity="0.75"/>

  <!-- Tibial spines -->
  <line x1="322" y1="230" x2="318" y2="242" stroke="#aaa" stroke-width="2" opacity="0.7"/>
  <line x1="342" y1="230" x2="346" y2="242" stroke="#aaa" stroke-width="2" opacity="0.7"/>

  <!-- Tibia shaft -->
  <rect x="280" y="256" width="106" height="68" rx="12" fill="#111" stroke="#999" stroke-width="1.5" opacity="0.65"/>

  <!-- Fibula -->
  <ellipse cx="418" cy="285" rx="16" ry="48" fill="none" stroke="#666" stroke-width="1.5" opacity="0.55"/>

  <!-- === KEYPOINTS (YOLOv8-pose) === -->
  <!-- Medial femoral condyle -->
  <circle cx="294" cy="168" r="8" fill="#00ff88" opacity="0.95"/>
  <circle cx="294" cy="168" r="15" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.35"/>
  <!-- Lateral femoral condyle -->
  <circle cx="370" cy="164" r="8" fill="#00ff88" opacity="0.95"/>
  <circle cx="370" cy="164" r="15" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.35"/>
  <!-- Medial tibial plateau -->
  <circle cx="295" cy="244" r="8" fill="#ffcc00" opacity="0.95"/>
  <circle cx="295" cy="244" r="15" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.35"/>
  <!-- Lateral tibial plateau -->
  <circle cx="370" cy="242" r="8" fill="#ffcc00" opacity="0.95"/>
  <circle cx="370" cy="242" r="15" fill="none" stroke="#ffcc00" stroke-width="1" opacity="0.35"/>
  <!-- Shaft axis points -->
  <circle cx="320" cy="60" r="5" fill="#66aaff" opacity="0.85"/>
  <circle cx="333" cy="298" r="5" fill="#66aaff" opacity="0.85"/>

  <!-- === ANGLE MEASUREMENT === -->
  <line x1="320" y1="60" x2="332" y2="244" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="7,4"/>
  <line x1="332" y1="244" x2="333" y2="298" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="7,4"/>
  <!-- Arc -->
  <path d="M 332,220 A 24,24 0 0,1 339,267" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>

  <!-- Angle label -->
  <text x="348" y="258" fill="#ffffff" font-size="15" font-family="monospace" font-weight="bold" opacity="0.95">172.3°</text>

  <!-- Corner labels -->
  <text x="14" y="22" fill="#444" font-size="9" font-family="monospace" letter-spacing="1">KNEE AP VIEW — DRR SYNTHETIC</text>
  <text x="14" y="34" fill="#333" font-size="8" font-family="monospace">YOLOv8-pose Keypoint Detection</text>

  <!-- Legend -->
  <circle cx="14" cy="320" r="5" fill="#00ff88"/>
  <text x="24" y="324" fill="#555" font-size="9" font-family="monospace">Femoral condyle</text>
  <circle cx="138" cy="320" r="5" fill="#ffcc00"/>
  <text x="148" y="324" fill="#555" font-size="9" font-family="monospace">Tibial plateau</text>
  <circle cx="252" cy="320" r="5" fill="#66aaff"/>
  <text x="262" y="324" fill="#555" font-size="9" font-family="monospace">Shaft axis</text>

  <!-- mAP50 badge -->
  <rect x="500" y="308" width="128" height="24" rx="2" fill="none" stroke="#222" stroke-width="1"/>
  <text x="510" y="324" fill="#555" font-size="9" font-family="monospace">mAP50: </text>
  <text x="558" y="324" fill="#00ff88" font-size="11" font-family="monospace" font-weight="bold">99.8%</text>
</svg>
